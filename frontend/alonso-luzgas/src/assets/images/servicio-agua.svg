<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b9fc7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5a7fa7;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bgGrad)"/>
  <!-- Water drop -->
  <path d="M300 100 C300 100, 240 180, 240 230 C240 270, 267 300, 300 300 C333 300, 360 270, 360 230 C360 180, 300 100, 300 100Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
  <!-- Inner highlight -->
  <path d="M280 200 C280 200, 265 225, 265 240 C265 255, 278 265, 290 260" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <!-- Splash drops -->
  <circle cx="225" cy="260" r="6" fill="rgba(255,255,255,0.4)"/>
  <circle cx="375" cy="250" r="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="350" cy="290" r="4" fill="rgba(255,255,255,0.35)"/>
  <circle cx="250" cy="285" r="4.5" fill="rgba(255,255,255,0.3)"/>
  <!-- Ripples -->
  <ellipse cx="300" cy="320" rx="50" ry="8" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <ellipse cx="300" cy="330" rx="70" ry="10" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="300" y="370" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">TRATAMIENTO DE AGUA</text>
</svg>
