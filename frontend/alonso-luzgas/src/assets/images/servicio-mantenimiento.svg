<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e85555;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c03a3a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bgGrad)"/>
  <!-- Wrench -->
  <path d="M230 130 L280 180 L270 190 L220 140 Z" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  <circle cx="215" cy="125" r="25" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
  <path d="M200 110 L195 105 M230 110 L235 105" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
  <!-- Screwdriver -->
  <line x1="320" y1="130" x2="370" y2="260" stroke="rgba(255,255,255,0.8)" stroke-width="8" stroke-linecap="round"/>
  <line x1="320" y1="130" x2="310" y2="100" stroke="rgba(255,255,255,0.9)" stroke-width="4" stroke-linecap="round"/>
  <polygon points="307,95 313,95 312,75 308,75" fill="rgba(255,255,255,0.8)"/>
  <!-- Gear -->
  <circle cx="300" cy="230" r="35" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="3"/>
  <circle cx="300" cy="230" r="15" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
  <!-- Gear teeth -->
  <rect x="295" y="190" width="10" height="15" fill="rgba(255,255,255,0.7)" rx="2"/>
  <rect x="295" y="260" width="10" height="15" fill="rgba(255,255,255,0.7)" rx="2"/>
  <rect x="260" y="225" width="15" height="10" fill="rgba(255,255,255,0.7)" rx="2"/>
  <rect x="325" y="225" width="15" height="10" fill="rgba(255,255,255,0.7)" rx="2"/>
  <text x="300" y="340" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">MANTENIMIENTOS</text>
</svg>
