<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7fc7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6b5fa7;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="flameGrad" cx="50%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#4da6ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#2060c0;stop-opacity:0.6"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bgGrad)"/>
  <!-- Gas burner ring -->
  <ellipse cx="300" cy="220" rx="90" ry="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <ellipse cx="300" cy="220" rx="70" ry="22" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Flames -->
  <path d="M250 200 C250 170, 270 160, 270 180 C270 160, 285 150, 285 175" fill="url(#flameGrad)" opacity="0.8"/>
  <path d="M280 195 C280 160, 300 145, 300 170 C300 145, 320 155, 320 185" fill="url(#flameGrad)" opacity="0.9"/>
  <path d="M310 200 C310 168, 330 158, 330 178 C330 158, 345 165, 345 195" fill="url(#flameGrad)" opacity="0.8"/>
  <path d="M265 205 C265 180, 280 172, 280 190" fill="url(#flameGrad)" opacity="0.7"/>
  <path d="M325 203 C325 178, 340 172, 338 192" fill="url(#flameGrad)" opacity="0.7"/>
  <!-- Center blue glow -->
  <circle cx="300" cy="185" r="25" fill="rgba(100,180,255,0.2)"/>
  <text x="300" y="340" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">GAS NATURAL</text>
</svg>
