<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0f8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8dae8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>
  
  <!-- Living room wall -->
  <rect x="0" y="200" width="1920" height="880" fill="url(#wallGrad)"/>
  
  <!-- Window -->
  <rect x="1300" y="250" width="350" height="280" fill="#d0e4f0" stroke="#a0a090" stroke-width="4" rx="4"/>
  <line x1="1475" y1="250" x2="1475" y2="530" stroke="#a0a090" stroke-width="3"/>
  <line x1="1300" y1="390" x2="1650" y2="390" stroke="#a0a090" stroke-width="3"/>
  
  <!-- Sofa -->
  <rect x="400" y="580" width="700" height="220" fill="#6b8fa8" rx="20"/>
  <rect x="380" y="550" width="740" height="60" fill="#5a7d96" rx="15"/>
  <!-- Sofa cushions -->
  <rect x="430" y="600" width="200" height="160" fill="#7aa0b8" rx="12"/>
  <rect x="650" y="600" width="200" height="160" fill="#7aa0b8" rx="12"/>
  <rect x="870" y="600" width="200" height="160" fill="#7aa0b8" rx="12"/>
  <!-- Sofa pillows -->
  <ellipse cx="500" cy="580" rx="55" ry="45" fill="#e8a050"/>
  <ellipse cx="1000" cy="580" rx="55" ry="45" fill="#c87040"/>
  
  <!-- People silhouettes on sofa -->
  <!-- Person 1 -->
  <ellipse cx="580" cy="490" rx="30" ry="35" fill="#b08060"/>
  <rect x="550" y="520" width="60" height="100" fill="#4a6878" rx="10"/>
  <!-- Person 2 -->
  <ellipse cx="780" cy="485" rx="28" ry="33" fill="#906848"/>
  <rect x="752" y="515" width="56" height="100" fill="#3a5868" rx="10"/>
  
  <!-- Side table -->
  <rect x="1150" y="620" width="80" height="120" fill="#8b6040" rx="4"/>
  <rect x="1140" y="610" width="100" height="15" fill="#7a5030" rx="3"/>
  <!-- Coffee mug -->
  <rect x="1165" y="590" width="25" height="22" fill="#ffffff" rx="3"/>
  <path d="M1190 595 C1200 595, 1200 608, 1190 608" fill="none" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Floor lamp -->
  <rect x="250" y="350" width="8" height="400" fill="#a09080"/>
  <path d="M220 350 L254 350 L280 350 C280 320, 220 320, 220 350Z" fill="#f0d890"/>
  <ellipse cx="254" cy="340" rx="35" ry="15" fill="#e8c870" opacity="0.6"/>
  
  <!-- Radiator -->
  <rect x="1340" y="600" width="200" height="150" fill="#e0e0e0" rx="5"/>
  <line x1="1360" y1="610" x2="1360" y2="740" stroke="#c8c8c8" stroke-width="3"/>
  <line x1="1385" y1="610" x2="1385" y2="740" stroke="#c8c8c8" stroke-width="3"/>
  <line x1="1410" y1="610" x2="1410" y2="740" stroke="#c8c8c8" stroke-width="3"/>
  <line x1="1435" y1="610" x2="1435" y2="740" stroke="#c8c8c8" stroke-width="3"/>
  <line x1="1460" y1="610" x2="1460" y2="740" stroke="#c8c8c8" stroke-width="3"/>
  <line x1="1485" y1="610" x2="1485" y2="740" stroke="#c8c8c8" stroke-width="3"/>
  <line x1="1510" y1="610" x2="1510" y2="740" stroke="#c8c8c8" stroke-width="3"/>
  
  <!-- Warm glow from radiator -->
  <ellipse cx="1440" cy="650" rx="120" ry="80" fill="#f5a623" opacity="0.05"/>
  
  <!-- Floor -->
  <rect x="0" y="800" width="1920" height="280" fill="#c8b898"/>
  <!-- Floor boards -->
  <line x1="0" y1="840" x2="1920" y2="840" stroke="#b8a888" stroke-width="1"/>
  <line x1="0" y1="880" x2="1920" y2="880" stroke="#b8a888" stroke-width="1"/>
  <line x1="0" y1="920" x2="1920" y2="920" stroke="#b8a888" stroke-width="1"/>
  
  <!-- Plant -->
  <rect x="140" y="700" width="50" height="60" fill="#8b6040" rx="4"/>
  <ellipse cx="165" cy="680" rx="40" ry="50" fill="#4a8850"/>
  <ellipse cx="145" cy="660" rx="25" ry="35" fill="#5a9860"/>
  <ellipse cx="185" cy="665" rx="28" ry="38" fill="#3a7840"/>
</svg>
