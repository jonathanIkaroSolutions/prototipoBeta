<div class="login-page">
  <div class="login-card">
    <div class="login-card__header">
      <img src="alonso.png" alt="Alonso Luz y Gas" class="login-card__logo" />
      <h1 class="login-card__title">Alonso Luz&Gas</h1>
      <p class="login-card__subtitle">Panel de Administración</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      @if (error()) {
        <div class="login-form__error">
          {{ error() }}
        </div>
      }

      <div class="login-form__group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="Introduce tu usuario"
          required
        />
      </div>

      <div class="login-form__group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Introduce tu contraseña"
          required
        />
      </div>

      <button 
        type="submit" 
        class="btn btn--primary login-form__submit"
        [disabled]="loading()"
      >
        {{ loading() ? 'Iniciando sesión...' : 'Iniciar sesión' }}
      </button>
    </form>

    <a routerLink="/" class="login-card__back">← Volver a la web</a>
  </div>
</div>
